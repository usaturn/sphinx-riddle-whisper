# dev-only の JS ツール（lint / jsdom テスト）向け Yarn Berry 設定。
# Yarn 本体のバージョンは package.json の packageManager（SHA-512 付き固定）で管理する。

# git 依存を導入した際の対話プロンプトを避けるための包括承認。
# 現在 git 依存は未使用のため実質不使用（導入時は個別リポジトリ指定へ絞ること）。
approvedGitRepositories:
  - "**"

# 依存の install script 実行を許可する（Yarn Berry の既定値と同じ。明示しておく）。
enableScripts: true

# PnP ではなく従来型 node_modules を使う。jsdom / node --test の実行前提と
# エディタ連携をシンプルに保つための意図的な選択。
nodeLinker: node-modules

# 公開直後パッケージの取得ゲートを無効化（0 分）。dev-only 用途で依存は
# npm 公式レジストリの著名パッケージのみ。サプライチェーン対策を強めるなら
# ここを 1 日相当（1440）以上へ引き上げる。
npmMinimalAgeGate: 0
