version: 2
updates:
  # SHA ピン留めしたアクションの更新追跡
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    groups:
      actions:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # uv.lock の Python 依存
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    groups:
      python:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # yarn.lock の JS 開発ツール（dev-only、wheel には入らない）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    groups:
      js-dev-tools:
        applies-to: version-updates
        update-types: ["minor", "patch"]
