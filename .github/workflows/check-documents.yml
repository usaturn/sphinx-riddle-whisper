name: sphinx-riddle-whisper

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Audit Python packages (uv audit, advisory)
      continue-on-error: true
      run: uv audit --locked

    - name: Install the project
      run: uv sync --all-groups

    - name: Build HTML
      run: uv run sphinx-build -W docs build

