requires = ["tox>=4.22", "tox-uv>=1.13"]
env_list = ["py311", "py312", "py313", "py314"]

[env_run_base]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]
commands = [["pytest"]]

[env.lint]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]
commands = [
    ["ruff", "check"],
    ["ruff", "format", "--check"],
    ["mypy", "src"],
]
